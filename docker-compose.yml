services:
  leadsgen:
    build: .
    image: leadsgen:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SNAPSHOT_DATABASE_PATH: /data/leadsgen.db
      SNAPSHOT_OUTPUT_DIR: /data/exports
    volumes:
      - leadsgen-data:/data
    ports:
      - "8000:8000"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  leadsgen-data:
